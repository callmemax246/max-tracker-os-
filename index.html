<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katana OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ffffff;
  --paper-soft:#fafafa;
  --tint:#f5f0fd;
  --tint-2:#ece1fb;
  --line:#e8e3ef;
  --line-strong:#d8cdee;
  --ink:#16121c;
  --ink-soft:#6e6779;
  --ink-faint:#a39db1;
  --violet:#6d28d9;
  --violet-deep:#4c1d95;
  --violet-bright:#7c3aed;
  --radius:12px;
  --radius-sm:7px;
  --shadow-sm:0 1px 2px rgba(22,12,28,0.05);
  --shadow-md:0 6px 20px rgba(35,12,70,0.08);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper-soft);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--violet);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important;transition-duration:0.001ms !important;}
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
.muted{color:var(--ink-soft);}
.faint{color:var(--ink-faint);}
.hidden{display:none !important;}

/* ---------- layout ---------- */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:72px;flex:0 0 72px;
  background:var(--paper);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;
  padding:18px 0;gap:4px;
  position:sticky;top:0;height:100vh;
}
.brand{
  width:36px;height:36px;border-radius:9px;background:var(--ink);
  display:flex;align-items:center;justify-content:center;color:#fff;
  margin-bottom:18px;font-family:var(--font-display);font-weight:700;font-size:15px;
  flex:0 0 auto;
}
.nav-btn{
  width:48px;height:48px;border:none;background:transparent;border-radius:var(--radius-sm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink-faint);position:relative;transition:background .15s,color .15s;
}
.nav-btn .glyph{font-size:17px;line-height:1;}
.nav-btn .lbl{font-size:9px;letter-spacing:.02em;font-weight:500;}
.nav-btn:hover{background:var(--tint);color:var(--violet-deep);}
.nav-btn.active{background:var(--tint-2);color:var(--violet-deep);}
.nav-btn.active::before{
  content:'';position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--violet);
}
.nav-spacer{flex:1;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}

.topbar{
  position:sticky;top:0;z-index:5;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;gap:20px;flex-wrap:wrap;
}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-name{font-family:var(--font-display);font-weight:600;font-size:15px;}
.tb-season{font-size:12px;color:var(--ink-soft);}
.tb-stats{display:flex;align-items:center;gap:22px;}
.tb-stat{display:flex;flex-direction:column;align-items:flex-end;}
.tb-stat .v{font-family:var(--font-mono);font-weight:600;font-size:15px;}
.tb-stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);}
.ring-wrap{display:flex;align-items:center;gap:10px;}
.ring-text{display:flex;flex-direction:column;}
.ring-text .title{font-family:var(--font-display);font-weight:600;font-size:13px;}
.ring-text .sub{font-size:10.5px;color:var(--ink-soft);font-family:var(--font-mono);}

.view-root{padding:28px;max-width:1080px;width:100%;margin:0 auto;}
.view{display:none;}
.view.active{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600;margin:0 0 12px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
@media (max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr;}}

.row{display:flex;align-items:center;gap:10px;}
.row.between{justify-content:space-between;}
.stack{display:flex;flex-direction:column;gap:10px;}

.btn{
  border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);
  padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:background .15s,color .15s,border-color .15s;
}
.btn:hover{background:var(--tint);}
.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff;}
.btn.primary:hover{background:var(--violet-deep);border-color:var(--violet-deep);}
.btn.violet{background:var(--violet);border-color:var(--violet);color:#fff;}
.btn.violet:hover{background:var(--violet-deep);}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.ghost:hover{background:var(--tint);}
.btn.danger{border-color:var(--ink);color:var(--ink);}
.btn.danger:hover{background:var(--ink);color:#fff;}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.block{width:100%;}

.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;background:var(--paper);}
.pill.tint{background:var(--tint);border-color:var(--tint-2);color:var(--violet-deep);}

input[type=text],input[type=number],textarea,select{
  border:1px solid var(--line-strong);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--ink);background:var(--paper);width:100%;
}
input[type=number]{font-family:var(--font-mono);}
textarea{resize:vertical;min-height:64px;}
label.field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--ink-soft);font-weight:600;}

/* checkbox quest row */
.qrow{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper);}
.qrow.done{background:var(--tint);border-color:var(--tint-2);}
.qrow .chk{width:19px;height:19px;border:1.5px solid var(--line-strong);border-radius:5px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#fff;}
.qrow.done .chk{background:var(--violet);border-color:var(--violet);color:#fff;}
.qrow .name{flex:1;font-size:13.5px;font-weight:500;}
.qrow.done .name{color:var(--ink-soft);text-decoration:line-through;}
.qrow .tag{font-size:10.5px;color:var(--violet-deep);background:var(--tint);border-radius:6px;padding:2px 7px;font-weight:600;}
.qrow .xp{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);min-width:44px;text-align:right;}
.qrow button{background:transparent;border:none;flex:0 0 auto;}

.boss-card{border:1px solid var(--ink);border-radius:var(--radius);padding:20px;background:linear-gradient(180deg,var(--paper) 0%, var(--tint) 130%);}
.boss-card .label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;}
.boss-card h3{font-size:20px;margin:6px 0 2px;}
.boss-bar{height:8px;border-radius:6px;background:var(--line);overflow:hidden;margin:12px 0;}
.boss-bar .fill{height:100%;background:var(--ink);}

.balance-bar{height:10px;border-radius:6px;background:var(--line);overflow:hidden;display:flex;}
.balance-bar .pos{background:var(--violet);height:100%;}
.balance-bar .neg{background:var(--ink);height:100%;}

.progress{height:8px;border-radius:6px;background:var(--line);overflow:hidden;}
.progress .fill{height:100%;background:var(--violet);border-radius:6px;}

.ach-card,.reward-card{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;background:var(--paper);}
.ach-card.unlocked{border-color:var(--violet);background:var(--tint);}
.ach-card .name{font-weight:700;font-size:13.5px;}
.ach-card .desc{font-size:12px;color:var(--ink-soft);margin:2px 0 8px;}

.log-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px;}
.log-row:last-child{border-bottom:none;}
.log-row .amt{font-family:var(--font-mono);font-weight:700;}
.log-row .amt.gain{color:var(--violet-deep);}
.log-row .amt.pen{color:var(--ink);background:var(--paper-soft);padding:2px 7px;border-radius:6px;}
.log-row .meta{font-size:11px;color:var(--ink-faint);}

.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab-btn{border:1px solid var(--line-strong);background:var(--paper);padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--ink-soft);}
.tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

.skill-domain{border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
.skill-node{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);}
.skill-node:first-of-type{border-top:none;}
.node-dot{width:10px;height:10px;border-radius:50%;background:var(--line-strong);flex:0 0 auto;}
.node-dot.on{background:var(--violet);}
.skill-node .nname{flex:1;font-size:13px;}
.skill-node.on .nname{font-weight:600;}
.skill-node .nxp{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);}

.timer-display{font-family:var(--font-mono);font-size:64px;font-weight:600;text-align:center;letter-spacing:-1px;}
.preset-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

.admin-section{border-bottom:1px solid var(--line);padding:22px 0;}
.admin-section:first-child{padding-top:0;}
.admin-section:last-child{border-bottom:none;}
.edit-row{display:grid;grid-template-columns:1fr 110px 80px 32px;gap:8px;align-items:center;margin-bottom:8px;}
.edit-row.q{grid-template-columns:1fr 130px 80px 32px;}
.edit-row.lvl{grid-template-columns:1fr 110px 32px;}
.edit-row.rw{grid-template-columns:1fr 100px 32px;}
.edit-row.ach{grid-template-columns:1fr 1fr 150px 80px 32px;}
.edit-row.node{grid-template-columns:1fr 100px 32px;}
.edit-row.pen{grid-template-columns:1fr 100px 32px;}
@media (max-width:700px){
  .edit-row,.edit-row.q,.edit-row.lvl,.edit-row.rw,.edit-row.ach,.edit-row.node,.edit-row.pen{grid-template-columns:1fr;}
}
.icon-btn{width:30px;height:30px;border:1px solid var(--line-strong);border-radius:7px;background:var(--paper);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.icon-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.danger-box{border:1px solid var(--ink);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:10px;}
.danger-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.danger-row .txt{font-size:12.5px;color:var(--ink-soft);max-width:420px;}

.empty{padding:30px 10px;text-align:center;color:var(--ink-faint);font-size:13px;}

/* toasts */
#toasts{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);max-width:300px;animation:toastin .18s ease;}
.toast.violet{background:var(--violet);}
@keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* float xp */
.floatxp{position:fixed;font-family:var(--font-mono);font-weight:700;font-size:15px;z-index:200;pointer-events:none;animation:floatup 1s ease forwards;}
.floatxp.gain{color:var(--violet);}
.floatxp.pen{color:var(--ink);}
@keyframes floatup{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-34px);}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,12,30,0.45);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px;}
.modal{background:var(--paper);border-radius:var(--radius);padding:24px;max-width:420px;width:100%;box-shadow:var(--shadow-md);}
.modal h3{font-size:17px;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--ink-soft);line-height:1.5;margin:0 0 16px;}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;}
.modal label.chk-line{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}

/* levelup */
.levelup-overlay{position:fixed;inset:0;background:rgba(16,10,24,0.6);display:flex;align-items:center;justify-content:center;z-index:160;}
.levelup-card{background:var(--paper);border-radius:18px;padding:40px 46px;text-align:center;box-shadow:var(--shadow-md);animation:popin .25s ease;}
@keyframes popin{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.levelup-card .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);font-weight:700;}
.levelup-card h2{font-size:30px;margin:8px 0 4px;}
.levelup-card .sub{color:var(--ink-soft);font-size:13px;margin-bottom:20px;}

@media (max-width:680px){
  #app{flex-direction:column;}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;flex-direction:row;height:62px;padding:0 6px;justify-content:space-between;border-right:none;border-top:1px solid var(--line);z-index:50;overflow-x:auto;}
  .brand{display:none;}
  .nav-spacer{display:none;}
  .main{padding-bottom:62px;}
  .view-root{padding:18px 16px;}
  .topbar{padding:12px 16px;}
  .tb-stats{gap:14px;}
}
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="brand">K</div>
    <button class="nav-btn" data-view="dashboard" aria-label="Dashboard"><span class="glyph">⌂</span><span class="lbl">Home</span></button>
    <button class="nav-btn" data-view="quests" aria-label="Quest Board"><span class="glyph">◆</span><span class="lbl">Quests</span></button>
    <button class="nav-btn" data-view="achievements" aria-label="Achievements"><span class="glyph">✦</span><span class="lbl">Wins</span></button>
    <button class="nav-btn" data-view="rewards" aria-label="Rewards"><span class="glyph">◈</span><span class="lbl">Reward</span></button>
    <button class="nav-btn" data-view="skilltree" aria-label="Skill Tree"><span class="glyph">⌬</span><span class="lbl">Skills</span></button>
    <button class="nav-btn" data-view="focus" aria-label="Focus Timer"><span class="glyph">◷</span><span class="lbl">Focus</span></button>
    <button class="nav-btn" data-view="log" aria-label="Log"><span class="glyph">≣</span><span class="lbl">Log</span></button>
    <div class="nav-spacer"></div>
    <button class="nav-btn" data-view="admin" aria-label="Admin"><span class="glyph">⚙</span><span class="lbl">Admin</span></button>
  </nav>

  <div class="main">
    <header class="topbar">
      <div class="tb-left">
        <div>
          <div class="tb-name" id="tbName">Player</div>
          <div class="tb-season" id="tbSeason">Season</div>
        </div>
      </div>
      <div class="tb-stats">
        <div class="ring-wrap">
          <svg width="46" height="46" viewBox="0 0 46 46">
            <circle cx="23" cy="23" r="19" fill="none" stroke="#e8e3ef" stroke-width="5"></circle>
            <circle id="ringFill" cx="23" cy="23" r="19" fill="none" stroke="#6d28d9" stroke-width="5" stroke-linecap="round" transform="rotate(-90 23 23)"></circle>
          </svg>
          <div class="ring-text">
            <div class="title" id="tbLevelTitle">Initiate</div>
            <div class="sub" id="tbLevelSub">0 / 100</div>
          </div>
        </div>
        <div class="tb-stat"><div class="v mono" id="tbStreak">0</div><div class="k">Streak</div></div>
        <div class="tb-stat"><div class="v mono" id="tbXP">0</div><div class="k">Season XP</div></div>
      </div>
    </header>

    <div class="view-root" id="viewRoot">

      <!-- DASHBOARD -->
      <section class="view" id="view-dashboard">
        <div class="grid grid-2" style="margin-bottom:18px;">
          <div class="card">
            <div class="section-title">This week</div>
            <div class="row" id="weekDots" style="gap:8px;"></div>
          </div>
          <div class="card">
            <div class="section-title">Season balance</div>
            <div class="balance-bar" id="balanceBar"><div class="pos" style="width:100%"></div></div>
            <div class="row between" style="margin-top:8px;font-size:11.5px;" class="mono">
              <span class="muted mono" id="balGain">+0 earned</span>
              <span class="muted mono" id="balPen">−0 penalty</span>
            </div>
          </div>
        </div>

        <div class="section-title">Daily 5</div>
        <div class="stack" id="daily5List" style="margin-bottom:22px;"></div>

        <div class="section-title">Boss battle</div>
        <div id="bossWrap" style="margin-bottom:22px;"></div>

        <div class="section-title">Log a slip</div>
        <div class="card" style="margin-bottom:8px;">
          <div class="row" id="quickPenRow" style="flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
          <div class="row" style="gap:8px;">
            <input type="text" id="customPenName" placeholder="Other slip…" style="flex:1;">
            <input type="number" id="customPenXP" placeholder="XP" style="width:80px;" value="5">
            <button class="btn sm" id="customPenBtn">Log</button>
          </div>
        </div>
      </section>

      <!-- QUESTS -->
      <section class="view" id="view-quests">
        <div class="tabs" id="questTabs">
          <button class="tab-btn active" data-qtab="daily">Daily</button>
          <button class="tab-btn" data-qtab="weekly">Weekly</button>
          <button class="tab-btn" data-qtab="side">Side</button>
        </div>
        <div class="stack" id="questList"></div>
      </section>

      <!-- ACHIEVEMENTS -->
      <section class="view" id="view-achievements">
        <div class="section-title">Achievements</div>
        <div class="grid grid-3" id="achList"></div>
      </section>

      <!-- REWARDS -->
      <section class="view" id="view-rewards">
        <div class="section-title">Reward timeline</div>
        <div class="stack" id="rewardList"></div>
      </section>

      <!-- SKILL TREE -->
      <section class="view" id="view-skilltree">
        <div class="section-title">Skill tree</div>
        <div class="grid grid-2" id="skillTreeWrap"></div>
      </section>

      <!-- FOCUS -->
      <section class="view" id="view-focus">
        <div class="card" style="text-align:center;max-width:480px;margin:0 auto 18px;">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="muted" id="timerState" style="margin-bottom:16px;font-size:12.5px;">Ready</div>
          <div class="preset-row" style="margin-bottom:14px;">
            <button class="btn sm" data-preset="25">25 min</button>
            <button class="btn sm" data-preset="50">50 min</button>
            <button class="btn sm" data-preset="90">90 min</button>
            <button class="btn sm" data-preset="5">5 min break</button>
          </div>
          <div class="row" style="justify-content:center;gap:8px;">
            <button class="btn primary" id="timerStartBtn">Start</button>
            <button class="btn" id="timerResetBtn">Reset</button>
          </div>
        </div>
        <div class="grid grid-2">
          <div class="card">
            <div class="section-title">Today</div>
            <div class="row between"><span class="muted">Sessions</span><span class="mono" id="focusSessionsToday">0</span></div>
            <div class="row between"><span class="muted">Minutes</span><span class="mono" id="focusMinutesToday">0</span></div>
          </div>
          <div class="card">
            <div class="section-title">Notes</div>
            <textarea id="focusNotes" placeholder="What are you working on?"></textarea>
          </div>
        </div>
      </section>

      <!-- LOG -->
      <section class="view" id="view-log">
        <div class="tabs" id="logTabs">
          <button class="tab-btn active" data-ltab="all">All</button>
          <button class="tab-btn" data-ltab="gain">Earned</button>
          <button class="tab-btn" data-ltab="pen">Penalties</button>
        </div>
        <div class="card" style="padding:6px 16px;" id="logCard"></div>
      </section>

      <!-- ADMIN -->
      <section class="view" id="view-admin">
        <div id="adminRoot"></div>
      </section>

    </div>
  </div>
</div>

<div id="toasts"></div>
<div id="modalRoot"></div>

<script>
'use strict';

/* =========================== constants =========================== */
var STORAGE_KEY='katana_os_v5';

/* =========================== utils =========================== */
function $(sel,root){ return (root||document).querySelector(sel); }
function $all(sel,root){ return Array.prototype.slice.call((root||document).querySelectorAll(sel)); }
function dateStr(d){
  var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function todayStr(){ return dateStr(new Date()); }
function mondayOf(ds){
  var d=new Date(ds+'T00:00:00');
  var day=d.getDay();
  var diff=(day===0?-6:1-day);
  d.setDate(d.getDate()+diff);
  return dateStr(d);
}
function daysBetween(a,b){
  var da=new Date(a+'T00:00:00'), db=new Date(b+'T00:00:00');
  return Math.round((db-da)/86400000);
}
function uid(prefix){
  state.seq=(state.seq||0)+1;
  return prefix+'_'+state.seq+'_'+Date.now().toString(36).slice(-4);
}
function clamp0(n){ return n<0?0:n; }
function escapeHtml(s){
  return String(s===undefined||s===null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function deepMerge(base, override){
  if (Array.isArray(base)){ return override!==undefined && Array.isArray(override) ? override : base; }
  if (base && typeof base==='object'){
    var out={};
    for (var k in base){
      out[k] = deepMerge(base[k], override ? override[k] : undefined);
    }
    return out;
  }
  return override!==undefined ? override : base;
}

/* =========================== state load/save =========================== */
var state;
function loadState(){
  var fallback=defaultState();
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return fallback;
    var parsed=JSON.parse(raw);
    return deepMerge(fallback, parsed);
  }catch(e){
    console.error('Failed to load saved state, starting fresh.', e);
    return fallback;
  }
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('Failed to save state', e);
    toast('Could not save — storage may be full.', 'pen');
  }
}

/* =========================== rollover / penalty engine =========================== */
function ensureToday(){
  var t=todayStr();
  if(!state.today.date){
    state.today.date=t;
  }
  if(!state.week.weekStart){
    state.week.weekStart=mondayOf(t);
  }
}

function runRollover(){
  ensureToday();
  var t=todayStr();
  var wk=mondayOf(t);

  if(state.today.date!==t){
    closeOutDay();
    state.today={date:t, daily5Done:{}, dailyQuestDone:{}, perfectDayAwarded:false, xpGainedToday:0, penaltyToday:false};
  }
  if(state.week.weekStart!==wk){
    closeOutWeek();
    state.week={weekStart:wk, weeklyQuestDone:{}};
    state.streak.weekDays=[false,false,false,false,false,false,false];
  }
  checkAchievements();
  saveState();
}

function closeOutDay(){
  var pen=state.penalties;
  if(pen.enabled){
    state.daily5.forEach(function(q){
      if(!state.today.daily5Done[q.id]){
        applyPenalty(pen.missedDaily5XP, 'Missed: '+q.text, true);
      }
    });
    state.quests.daily.forEach(function(q){
      if(!state.today.dailyQuestDone[q.id]){
        applyPenalty(pen.missedDailyQuestXP, 'Missed quest: '+q.name, true);
      }
    });
  }
  if(state.today.xpGainedToday>0){
    state.streak.current+=1;
    if(state.streak.current>state.streak.longest) state.streak.longest=state.streak.current;
  } else {
    if(state.streak.current>0 && pen.enabled){
      applyPenalty(pen.streakBreakXP, 'Streak broken', true);
    }
    state.streak.current=0;
  }
  if(!state.today.penaltyToday){
    state.stats.cleanStreakDays+=1;
  } else {
    state.stats.cleanStreakDays=0;
  }
}

function closeOutWeek(){
  var pen=state.penalties;
  if(pen.enabled){
    state.quests.weekly.forEach(function(q){
      if(!state.week.weeklyQuestDone[q.id]){
        applyPenalty(pen.missedWeeklyQuestXP, 'Missed weekly: '+q.name, true);
      }
    });
  }
}

/* =========================== xp engine =========================== */
function addXP(amount, reason, opts){
  opts=opts||{};
  amount=Math.round(amount);
  if(amount<=0) return;
  state.xp+=amount;
  state.lifetimeXP+=amount;
  state.today.xpGainedToday+=amount;
  if(opts.category && state.categoryXP[opts.category]!==undefined){
    state.categoryXP[opts.category]+=amount;
  }
  logEntry('gain', amount, reason);
  if(!opts.silent){ toast('+'+amount+' XP — '+reason, 'violet'); spawnFloat('+'+amount,'gain'); }
  checkLevelUp();
  checkAchievements();
}

function removeXP(amount, opts){
  opts=opts||{};
  amount=Math.round(amount);
  if(amount<=0) return;
  state.xp=clamp0(state.xp-amount);
  state.lifetimeXP=clamp0(state.lifetimeXP-amount);
  state.today.xpGainedToday-=amount;
  if(opts.category && state.categoryXP[opts.category]!==undefined){
    state.categoryXP[opts.category]=clamp0(state.categoryXP[opts.category]-amount);
  }
}

function applyPenalty(amount, reason, silent){
  amount=Math.round(amount);
  if(amount<=0) return;
  state.xp=clamp0(state.xp-amount);
  state.today.penaltyToday=true;
  state.stats.cleanStreakDays=0;
  logEntry('pen', amount, reason);
  if(!silent){ toast('−'+amount+' XP — '+reason, 'pen'); spawnFloat('−'+amount,'pen'); }
}

function logEntry(type, amount, reason){
  state.xpLog.unshift({type:type, amount:amount, reason:reason, date:todayStr(), ts:Date.now()});
  if(state.xpLog.length>300){ state.xpLog.length=300; }
}

function levelInfo(){
  var levels=state.levels.slice().sort(function(a,b){return a.threshold-b.threshold;});
  var idx=0;
  for(var i=0;i<levels.length;i++){
    if(state.xp>=levels[i].threshold) idx=i; else break;
  }
  var current=levels[idx];
  var next=levels[idx+1]||null;
  var pct = next ? (state.xp-current.threshold)/(next.threshold-current.threshold) : 1;
  return {title:current.title, next:next, pct:Math.max(0,Math.min(1,pct)), currentThreshold:current.threshold, idx:idx};
}

var lastLevelIdx=null;
function checkLevelUp(){
  var info=levelInfo();
  if(lastLevelIdx===null){ lastLevelIdx=info.idx; return; }
  if(info.idx>lastLevelIdx){
    lastLevelIdx=info.idx;
    showLevelUp(info.title);
  } else {
    lastLevelIdx=info.idx;
  }
}

function metricValue(metric){
  switch(metric){
    case 'totalQuestsCompleted': return state.stats.dailyQuestsCompleted+state.stats.weeklyQuestsCompleted+state.stats.sideQuestsCompleted;
    case 'perfectDays': return state.stats.perfectDays;
    case 'longestStreak': return state.streak.longest;
    case 'lifetimeXP': return state.lifetimeXP;
    case 'bossesDefeated': return state.stats.bossesDefeated;
    case 'cleanStreak': return state.stats.cleanStreakDays;
    default: return 0;
  }
}

function checkAchievements(){
  state.achievements.forEach(function(a){
    if(state.unlockedAchievements.indexOf(a.id)>=0) return;
    if(metricValue(a.metric)>=a.target){
      state.unlockedAchievements.push(a.id);
      addXP(25, 'Achievement: '+a.name, {silent:true});
      toast('Achievement unlocked — '+a.name, 'violet');
    }
  });
}

/* =========================== quest actions =========================== */
function toggleDaily5(id){
  var q=state.daily5.find(function(x){return x.id===id;});
  if(!q) return;
  var done=!!state.today.daily5Done[id];
  if(!done){
    state.today.daily5Done[id]=true;
    addXP(q.xp, q.text, {silent:false});
  } else {
    delete state.today.daily5Done[id];
    removeXP(q.xp, {});
  }
  var allDone=state.daily5.every(function(x){return !!state.today.daily5Done[x.id];});
  if(allDone && !state.today.perfectDayAwarded){
    state.today.perfectDayAwarded=true;
    state.stats.perfectDays+=1;
    addXP(state.economy.perfectDayBonus, 'Perfect Day bonus', {silent:false});
  } else if(!allDone && state.today.perfectDayAwarded){
    state.today.perfectDayAwarded=false;
    state.stats.perfectDays=clamp0(state.stats.perfectDays-1);
    removeXP(state.economy.perfectDayBonus, {});
  }
  saveState(); renderAll();
}

function toggleDailyQuest(id){
  var q=state.quests.daily.find(function(x){return x.id===id;});
  if(!q) return;
  var done=!!state.today.dailyQuestDone[id];
  if(!done){
    state.today.dailyQuestDone[id]=true;
    state.stats.dailyQuestsCompleted+=1;
    addXP(q.xp, q.name, {category:q.category});
  } else {
    delete state.today.dailyQuestDone[id];
    state.stats.dailyQuestsCompleted=clamp0(state.stats.dailyQuestsCompleted-1);
    removeXP(q.xp, {category:q.category});
  }
  saveState(); renderAll();
}

function toggleWeeklyQuest(id){
  var q=state.quests.weekly.find(function(x){return x.id===id;});
  if(!q) return;
  var done=!!state.week.weeklyQuestDone[id];
  if(!done){
    state.week.weeklyQuestDone[id]=true;
    state.stats.weeklyQuestsCompleted+=1;
    addXP(q.xp, q.name, {category:q.category});
  } else {
    delete state.week.weeklyQuestDone[id];
    state.stats.weeklyQuestsCompleted=clamp0(state.stats.weeklyQuestsCompleted-1);
    removeXP(q.xp, {category:q.category});
  }
  saveState(); renderAll();
}

function getBoss(){
  var active=state.quests.side.filter(function(q){ return state.sideCompleted.indexOf(q.id)<0; });
  if(!active.length) return null;
  return active.slice().sort(function(a,b){return b.xp-a.xp;})[0];
}

function completeSideQuest(id){
  var q=state.quests.side.find(function(x){return x.id===id;});
  if(!q) return;
  if(state.sideCompleted.indexOf(id)>=0) return;
  var boss=getBoss();
  var isBoss = boss && boss.id===id;
  showConfirm({
    title: isBoss ? 'Defeat boss quest?' : 'Complete side quest?',
    message: q.name+' — awards '+(isBoss?Math.round(q.xp*(1+state.economy.bossBonusPct)):q.xp)+' XP. This cannot be undone.',
    confirmLabel: isBoss ? 'Defeat' : 'Complete',
    onConfirm:function(){
      state.sideCompleted.push(id);
      state.stats.sideQuestsCompleted+=1;
      var amount=q.xp;
      if(isBoss){
        amount=Math.round(q.xp*(1+state.economy.bossBonusPct));
        state.stats.bossesDefeated+=1;
      }
      addXP(amount, (isBoss?'Boss defeated: ':'')+q.name, {category:q.category});
      saveState(); renderAll();
    }
  });
}

/* =========================== rendering =========================== */
var currentView='dashboard';
var currentQuestTab='daily';
var currentLogTab='all';

function switchView(v){
  currentView=v;
  $all('.nav-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.view===v); });
  $all('.view').forEach(function(sec){ sec.classList.toggle('active', sec.id==='view-'+v); });
}

function toast(msg, kind){
  var el=document.createElement('div');
  el.className='toast'+(kind==='violet'?' violet':'');
  el.textContent=msg;
  $('#toasts').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3200);
}

function spawnFloat(text, kind){
  var anchor=$('#tbXP');
  if(!anchor) return;
  var rect=anchor.getBoundingClientRect();
  var el=document.createElement('div');
  el.className='floatxp '+kind;
  el.textContent=text;
  el.style.left=(rect.left)+'px';
  el.style.top=(rect.top-6)+'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', function(){ el.remove(); });
}

function showLevelUp(title){
  var overlay=document.createElement('div');
  overlay.className='levelup-overlay';
  overlay.innerHTML='<div class="levelup-card"><div class="eyebrow">Level Up</div><h2>'+escapeHtml(title)+'</h2><div class="sub">New season rank reached</div><button class="btn primary" id="levelUpClose">Continue</button></div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#levelUpClose').addEventListener('click', function(){ overlay.remove(); });
}

function showConfirm(opts){
  var root=$('#modalRoot');
  var requireCheck=!!opts.requireCheck;
  var html='<div class="overlay"><div class="modal">'+
    '<h3>'+escapeHtml(opts.title)+'</h3>'+
    '<p>'+escapeHtml(opts.message)+'</p>'+
    (requireCheck ? '<label class="chk-line"><input type="checkbox" id="confirmChk"> I understand this cannot be undone.</label>' : '')+
    '<div class="actions"><button class="btn" id="confirmCancel">Cancel</button>'+
    '<button class="btn '+(opts.danger?'danger':'primary')+'" id="confirmOk" '+(requireCheck?'disabled':'')+'>'+escapeHtml(opts.confirmLabel||'Confirm')+'</button></div>'+
    '</div></div>';
  root.innerHTML=html;
  var overlay=root.querySelector('.overlay');
  function close(){ root.innerHTML=''; }
  overlay.querySelector('#confirmCancel').addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
  var okBtn=overlay.querySelector('#confirmOk');
  if(requireCheck){
    overlay.querySelector('#confirmChk').addEventListener('change', function(e){
      okBtn.disabled=!e.target.checked;
    });
  }
  okBtn.addEventListener('click', function(){
    close();
    opts.onConfirm && opts.onConfirm();
  });
}

function renderTopbar(){
  $('#tbName').textContent=state.player.name;
  $('#tbSeason').textContent=state.player.season;
  $('#tbStreak').textContent=state.streak.current;
  $('#tbXP').textContent=state.xp;
  var info=levelInfo();
  $('#tbLevelTitle').textContent=info.title;
  $('#tbLevelSub').textContent= info.next ? (state.xp+' / '+info.next.threshold) : 'Max rank';
  var ring=$('#ringFill');
  var circumference=2*Math.PI*19;
  ring.setAttribute('stroke-dasharray', circumference);
  ring.setAttribute('stroke-dashoffset', circumference*(1-info.pct));
}

function renderDashboard(){
  var dots=$('#weekDots');
  dots.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach(function(d,i){
    var on=state.streak.weekDays[i];
    var b=document.createElement('button');
    b.className='pill'+(on?' tint':'');
    b.style.width='34px'; b.style.justifyContent='center'; b.style.padding='8px 0';
    b.textContent=d;
    b.addEventListener('click', function(){
      state.streak.weekDays[i]=!state.streak.weekDays[i];
      saveState(); renderDashboard();
    });
    dots.appendChild(b);
  });

  var totalLogged = state.xpLog.reduce(function(s,e){ return s + (e.type==='gain'?e.amount:0); },0);
  var totalPen = state.xpLog.reduce(function(s,e){ return s + (e.type==='pen'?e.amount:0); },0);
  var gainPct = (totalLogged+totalPen)>0 ? totalLogged/(totalLogged+totalPen)*100 : 100;
  $('#balanceBar').innerHTML='<div class="pos" style="width:'+gainPct+'%"></div><div class="neg" style="width:'+(100-gainPct)+'%"></div>';
  $('#balGain').textContent='+'+totalLogged+' earned';
  $('#balPen').textContent='−'+totalPen+' penalty';

  var list=$('#daily5List');
  list.innerHTML='';
  if(!state.daily5.length){ list.innerHTML='<div class="empty">No daily check-ins yet — add some in Admin.</div>'; }
  state.daily5.forEach(function(q){
    var done=!!state.today.daily5Done[q.id];
    var row=document.createElement('div');
    row.className='qrow'+(done?' done':'');
    row.innerHTML='<div class="chk">'+(done?'✓':'')+'</div><div class="name">'+escapeHtml(q.text)+'</div><div class="xp">+'+q.xp+'</div>';
    row.addEventListener('click', function(){ toggleDaily5(q.id); });
    list.appendChild(row);
  });

  var bossWrap=$('#bossWrap');
  var boss=getBoss();
  if(!boss){
    bossWrap.innerHTML='<div class="empty">No active side quests. Add one in Admin to summon a boss.</div>';
  } else {
    var bonusXP=Math.round(boss.xp*(1+state.economy.bossBonusPct));
    bossWrap.innerHTML='<div class="boss-card">'+
      '<div class="label">'+escapeHtml(boss.category)+' · Boss tier</div>'+
      '<h3>'+escapeHtml(boss.name)+'</h3>'+
      '<div class="muted" style="font-size:12.5px;">Defeating this awards '+bonusXP+' XP ('+boss.xp+' + boss bonus)</div>'+
      '<div class="boss-bar"><div class="fill" style="width:100%"></div></div>'+
      '<button class="btn violet" id="defeatBossBtn">Defeat boss</button>'+
      '</div>';
    $('#defeatBossBtn').addEventListener('click', function(){ completeSideQuest(boss.id); });
  }

  var qpRow=$('#quickPenRow');
  qpRow.innerHTML='';
  if(!state.penalties.quick.length){
    qpRow.innerHTML='<span class="faint" style="font-size:12px;">No quick penalties configured — add some in Admin.</span>';
  }
  state.penalties.quick.forEach(function(p){
    var b=document.createElement('button');
    b.className='pill';
    b.innerHTML=escapeHtml(p.name)+' <span class="mono" style="color:var(--ink-soft)">−'+p.xp+'</span>';
    b.addEventListener('click', function(){
      applyPenalty(p.xp, p.name);
      saveState(); renderAll();
    });
    qpRow.appendChild(b);
  });
}

function renderQuests(){
  $all('#questTabs .tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.qtab===currentQuestTab); });
  var list=$('#questList');
  list.innerHTML='';
  if(currentQuestTab==='daily'){
    if(!state.quests.daily.length){ list.innerHTML='<div class="empty">No daily quests yet.</div>'; return; }
    state.quests.daily.forEach(function(q){
      var done=!!state.today.dailyQuestDone[q.id];
      var row=buildQuestRow(q, done, function(){ toggleDailyQuest(q.id); });
      list.appendChild(row);
    });
  } else if(currentQuestTab==='weekly'){
    if(!state.quests.weekly.length){ list.innerHTML='<div class="empty">No weekly quests yet.</div>'; return; }
    state.quests.weekly.forEach(function(q){
      var done=!!state.week.weeklyQuestDone[q.id];
      var row=buildQuestRow(q, done, function(){ toggleWeeklyQuest(q.id); });
      list.appendChild(row);
    });
  } else {
    var active=state.quests.side.filter(function(q){ return state.sideCompleted.indexOf(q.id)<0; });
    var done=state.quests.side.filter(function(q){ return state.sideCompleted.indexOf(q.id)>=0; });
    if(!active.length && !done.length){ list.innerHTML='<div class="empty">No side quests yet.</div>'; return; }
    active.forEach(function(q){
      var row=buildQuestRow(q, false, function(){ completeSideQuest(q.id); });
      list.appendChild(row);
    });
    done.forEach(function(q){
      var row=buildQuestRow(q, true, function(){});
      list.appendChild(row);
    });
  }
}

function buildQuestRow(q, done, onToggle){
  var row=document.createElement('div');
  row.className='qrow'+(done?' done':'');
  row.innerHTML='<div class="chk">'+(done?'✓':'')+'</div>'+
    '<div class="name">'+escapeHtml(q.name)+'</div>'+
    '<div class="tag">'+catIcon(q.category)+' '+escapeHtml(q.category)+'</div>'+
    '<div class="xp">+'+q.xp+'</div>';
  if(!done){ row.addEventListener('click', onToggle); }
  return row;
}

/* =========================== focus timer =========================== */
var timer={seconds:25*60, total:25*60, running:false, intervalId:null, mode:'25'};
function renderFocusStats(){
  $('#focusSessionsToday').textContent=state.stats.focusSessions;
  $('#focusMinutesToday').textContent=state.stats.focusMinutesTotal;
  $('#focusNotes').value=state.focus.notes||'';
}
function formatTime(s){
  var m=Math.floor(s/60), sec=s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function renderTimer(){
  $('#timerDisplay').textContent=formatTime(timer.seconds);
  $('#timerState').textContent= timer.running ? 'Focusing…' : (timer.seconds===timer.total ? 'Ready' : 'Paused');
  $('#timerStartBtn').textContent= timer.running ? 'Pause' : 'Start';
}
function setPreset(mins){
  if(timer.intervalId){ clearInterval(timer.intervalId); timer.intervalId=null; }
  timer.running=false;
  timer.mode=String(mins);
  timer.total=mins*60;
  timer.seconds=mins*60;
  renderTimer();
}
function startPauseTimer(){
  if(timer.running){
    clearInterval(timer.intervalId); timer.intervalId=null; timer.running=false; renderTimer(); return;
  }
  timer.running=true;
  renderTimer();
  timer.intervalId=setInterval(function(){
    timer.seconds-=1;
    if(timer.seconds<=0){
      clearInterval(timer.intervalId); timer.intervalId=null; timer.running=false;
      onTimerComplete();
      return;
    }
    renderTimer();
  },1000);
}
function resetTimer(){
  if(timer.intervalId){ clearInterval(timer.intervalId); timer.intervalId=null; }
  timer.running=false;
  timer.seconds=timer.total;
  renderTimer();
}
function onTimerComplete(){
  var mins=Math.round(timer.total/60);
  if(timer.mode!=='5'){
    state.stats.focusSessions+=1;
    state.stats.focusMinutesTotal+=mins;
    addXP(Math.round(mins*state.economy.focusXPPerMinute), 'Focus session ('+mins+'m)', {});
    saveState();
  } else {
    toast('Break complete', 'violet');
  }
  timer.seconds=timer.total;
  renderTimer(); renderFocusStats(); checkAchievements();
}

  on('[data-qp-xp]','change',function(e){
    var id=e.target.getAttribute('data-qp-xp');
    var p=state.penalties.quick.find(function(x){return x.id===id;});
    if(p){ p.xp=Number(e.target.value)||0; saveState(); }
  });
  on('[data-del-qp]','click',function(e){
    var id=e.target.getAttribute('data-del-qp');
    state.penalties.quick=state.penalties.quick.filter(function(x){return x.id!==id;});
    saveState(); renderAdmin(); renderDashboard();
  });

  on('[data-add]','click',function(e){
    var key=e.target.getAttribute('data-add');
    if(key==='level'){ state.levels.push({id:uid('lvl'), title:'New Level', threshold:0}); }
    else if(key==='daily5'){ state.daily5.push({id:uid('d'), text:'New check-in', xp:10}); }
    else if(key.indexOf('quest_')===0){ var type=key.split('_')[1]; state.quests[type].push({id:uid('q'), name:'New quest', category:'Business', xp:10}); }
    else if(key==='achievement'){ state.achievements.push({id:uid('a'), name:'New achievement', desc:'Describe it', metric:'lifetimeXP', target:100}); }
    else if(key==='reward'){ state.rewards.push({id:uid('r'), name:'New reward', xpRequired:100}); }
    else if(key.indexOf('node_')===0){ var domain=key.slice(5); state.skillTree[domain].push({id:uid('n'), name:'New milestone', xp:50}); }
    else if(key==='quickpen'){ state.penalties.quick.push({id:uid('p'), name:'New slip', xp:5}); }
    saveState(); renderAdmin();
  });

  $('#adm_export').addEventListener('click', function(){
    var blob=new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='katana-os-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });
  $('#adm_import_btn').addEventListener('click', function(){ $('#adm_import_file').click(); });
  $('#adm_import_file').addEventListener('change', function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var parsed=JSON.parse(reader.result);
        if(!parsed || typeof parsed!=='object' || !('quests' in parsed) || !('levels' in parsed)){
          toast('That file doesn\'t look like a Katana OS backup.', 'pen');
          return;
        }
        showConfirm({
          title:'Import backup?',
          message:'This will replace all current data with the imported file.',
          danger:true,
          requireCheck:true,
          confirmLabel:'Import',
          onConfirm:function(){
            state=deepMerge(defaultState(), parsed);
            lastLevelIdx=null;
            saveState(); runRollover(); renderAll();
            toast('Backup imported.', 'violet');
          }
        });
      }catch(err){
        toast('Could not read that file — invalid JSON.', 'pen');
      }
      $('#adm_import_file').value='';
    };
    reader.readAsText(file);
  });

  $('#adm_reset_progress').addEventListener('click', function(){
    showConfirm({
      title:'Reset progress?',
      message:'All XP, streaks, stats and unlocked achievements will be wiped. Your quests, levels and settings stay as configured.',
      danger:true, requireCheck:true, confirmLabel:'Reset progress',
      onConfirm:function(){
        var fresh=defaultState();
        state.xp=0; state.lifetimeXP=0;
        state.categoryXP={Business:0,Content:0,Learning:0,Fitness:0,Nutrition:0};
        state.sideCompleted=[]; state.unlockedAchievements=[];
        state.stats=fresh.stats; state.streak=fresh.streak;
        state.today=fresh.today; state.week=fresh.week; state.xpLog=[];
        lastLevelIdx=null;
        saveState(); runRollover(); renderAll();
        toast('Progress reset.', 'violet');
      }
    });
  });
  $('#adm_new_month').addEventListener('click', function(){
    showConfirm({
      title:'Start a new month?',
      message:'Season XP resets to 0 and today/this-week checkmarks clear. Lifetime stats, skill tree and achievements are kept.',
      danger:true, requireCheck:true, confirmLabel:'Start new month',
      onConfirm:function(){
        state.xp=0;
        state.today.daily5Done={}; state.today.dailyQuestDone={}; state.today.perfectDayAwarded=false;
        state.week.weeklyQuestDone={};
        state.streak.weekDays=[false,false,false,false,false,false,false];
        lastLevelIdx=null;
        saveState(); renderAll();
        toast('New month started.', 'violet');
      }
    });
  });
  $('#adm_reset_all').addEventListener('click', function(){
    showConfirm({
      title:'Reset everything?',
      message:'This wipes all progress and restores every quest, level and setting to factory defaults.',
      danger:true, requireCheck:true, confirmLabel:'Reset everything',
      onConfirm:function(){
        state=defaultState();
        lastLevelIdx=null;
        saveState(); runRollover(); renderAll();
        toast('Factory reset complete.', 'violet');
      }
    });
  });
}

/* =========================== render all =========================== */
function renderAll(){
  renderTopbar();
  renderDashboard();
  renderQuests();
  renderAchievements();
  renderRewards();
  renderSkillTree();
  renderLog();
  renderFocusStats();
  renderAdmin();
}

/* =========================== global events =========================== */
function bindGlobalEvents(){
  $all('.nav-btn').forEach(function(b){
    b.addEventListener('click', function(){ switchView(b.dataset.view); });
  });
  $all('#questTabs .tab-btn').forEach(function(b){
    b.addEventListener('click', function(){ currentQuestTab=b.dataset.qtab; renderQuests(); });
  });
  $all('#logTabs .tab-btn').forEach(function(b){
    b.addEventListener('click', function(){ currentLogTab=b.dataset.ltab; renderLog(); });
  });
  $all('[data-preset]').forEach(function(b){
    b.addEventListener('click', function(){ setPreset(Number(b.dataset.preset)); });
  });
  $('#timerStartBtn').addEventListener('click', startPauseTimer);
  $('#timerResetBtn').addEventListener('click', resetTimer);
  $('#focusNotes').addEventListener('blur', function(e){ state.focus.notes=e.target.value; saveState(); });

  $('#customPenBtn').addEventListener('click', function(){
    var nameEl=$('#customPenName'), xpEl=$('#customPenXP');
    var name=nameEl.value.trim();
    var amt=Number(xpEl.value)||5;
    if(!name){ toast('Describe the slip first.', 'pen'); return; }
    applyPenalty(amt, name);
    nameEl.value=''; xpEl.value='5';
    saveState(); renderAll();
  });

  document.addEventListener('keydown', function(e){
    var tag=(document.activeElement && document.activeElement.tagName) || '';
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
    var map={'1':'dashboard','2':'quests','3':'achievements','4':'rewards','5':'skilltree','6':'focus','7':'log'};
    if(map[e.key]){ switchView(map[e.key]); }
    else if(e.key==='e' || e.key==='E'){ switchView('admin'); }
  });
}

/* =========================== init =========================== */
function init(){
  state=loadState();
  runRollover();
  lastLevelIdx=levelInfo().idx;
  switchView('dashboard');
  setPreset(25);
  bindGlobalEvents();
  renderAll();
  setInterval(runRollover, 60000);
}
init();
</script>
</body>
</html>
